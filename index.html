<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>أكاديمية أساس التعليمية</title>

<link rel="stylesheet" href="style.css">

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;800&display=swap" rel="stylesheet">
</head>

<body>

<header class="hero">

<div class="language-switcher">
<button onclick="setLang('ar')">العربية</button>
<button onclick="setLang('fr')">Français</button>
<button onclick="setLang('en')">English</button>
</div>

<div class="hero-content">

<h1 id="academyName">
أكاديمية أساس التعليمية
</h1>

<h3 id="teacherName">
أريج قادري
</h3>

<p id="academyDescription">
دروس دعم ودروس خصوصية حضورية وأونلاين
</p>

</div>

</header>

<section class="registration-section">

<div class="form-container">

<h2 id="registrationTitle">
التسجيل في الأكاديمية
</h2>

<form action="https://formsubmit.co/gigiaridj5@gmail.com" method="POST">

<input type="hidden" name="_captcha" value="false">

<input type="hidden" name="_subject"
value="طلب تسجيل جديد في أكاديمية أساس التعليمية">

<div class="input-group">
<input
type="text"
id="name"
name="الاسم"
placeholder="الاسم"
required>
</div>

<div class="input-group">
<input
type="text"
id="lastname"
name="اللقب"
placeholder="اللقب"
required>
</div>

<div class="input-group">
<input
type="tel"
id="phone"
name="رقم الهاتف"
placeholder="رقم الهاتف"
required>
</div>

<div class="input-group">
<input
type="email"
id="email"
name="البريد الإلكتروني"
placeholder="البريد الإلكتروني"
required>
</div>

<div class="input-group">
<select id="level" name="الطور الدراسي"
onchange="updateYears()"
required>

<option value="">
اختر الطور الدراسي
</option>

<option value="primary">
ابتدائي
</option>

<option value="middle">
متوسط
</option>

<option value="secondary">
ثانوي
</option>

</select>
</div>

<div class="input-group">
<select
id="year"
name="السنة الدراسية"
required>

<option>
اختر السنة الدراسية
</option>

</select>
</div>

<div class="input-group">
<select name="نوع الدراسة" required>

<option>
حضوري
</option>

<option>
أونلاين
</option>

</select>
</div>

<div class="input-group">
<select name="المادة" required>

<option>
العربية
</option>

<option>
الإنجليزية
</option>

<option>
الفرنسية
</option>

<option>
الرياضيات
</option>

<option>
الإعلام الآلي
</option>

</select>
</div>

<div class="input-group">
<textarea
id="notes"
name="ملاحظات"
placeholder="ملاحظات إضافية">
</textarea>
</div>

<button
id="submitBtn"
class="submit-btn"
type="submit">

إرسال الطلب

</button>

</form>

</div>

</section>

<script src="script.js"></script>

</body>
</html>
